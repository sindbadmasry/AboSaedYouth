    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                        num: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        print: {
                            bg: '#FFFFFF',
                            text: '#111827',
                            accent: '#4338CA', 
                            accentLight: '#EEF2FF',
                            border: '#E5E7EB',
                            card: '#F8FAFC'
                        },
                        tv: {
                            dark: '#0a0a1a',

                            red: '#ff0044',
                            magenta: '#b800ff'

                    }
                }

    <style>
        body { 
            background-color: #F1F5F9; 
            font-family: 'Tajawal', sans-serif;
            color: #111827;
            -webkit-font-smoothing: antialiased;
        }
        
        .editable {
            transition: all 0.2s ease;
            border: 1px solid transparent;
            border-radius: 0.375rem; 
            width: 100%;
        }
        .editable:hover { background-color: #F1F5F9; border-color: #CBD5E1; }
        .editable:focus {
            background-color: #FFFFFF;
            border-color: #4338CA;
            outline: none;
            box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.15);
        }

        /* تنسيق الحقول القابلة للتعديل في اللوحة المظلمة */
        .editable-dark {
            background: transparent;
            border: 1px solid transparent;
            color: white;
            transition: all 0.2s;
            border-radius: 4px;
        }
        .editable-dark:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }
        .editable-dark:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .font-num { font-family: 'Inter', sans-serif; font-variant-numeric: tabular-nums; }

        /* تأثيرات الإضاءة للوحة البث */
        .glow-cyan { text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff; }
        .glow-white { text-shadow: 0 0 10px rgba(255,255,255,0.8); }
        
        /* إعدادات الطباعة السحرية المحسنة */
        @media print {
            @page {
                size: A4 portrait;
                margin: 10mm; 
            }
            body {
                background-color: #FFFFFF !important;
                margin: 0 !important;
                padding: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .no-print { display: none !important; }
            
            .print-paper {
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                border: none !important;
                box-shadow: none !important;
                background-color: #FFFFFF !important;
                display: flex !important;
                flex-direction: column !important;
                min-height: 277mm !important; 
            }

            .editable, .editable-dark {
                border: none !important;
                background-color: transparent !important;
                padding: 0 !important;
                appearance: none !important; 
            }
            select.editable { display: none !important; }
            .print-team-label { 
                display: block !important; 
                white-space: nowrap !important;
                overflow: hidden !important;
                text-overflow: ellipsis !important;
            }

            .event-item {
                display: grid !important;
                grid-template-columns: 45px 30px 1fr 100px !important;
                padding: 4px !important; 
                margin-bottom: 2px !important;
                align-items: center !important;
                border-width: 1px !important;
                font-size: 0.75rem !important; 
                gap: 4px !important;
            }
            .event-item input { font-size: 0.75rem !important; }
            .event-icon { font-size: 0.875rem !important; }
            
            .print-header { padding-bottom: 8px !important; margin-bottom: 12px !important; }
        }

        .print-team-label { display: none; }
    </style>
</head>
<body x-data="matchApp()">

    <div class="w-full max-w-[210mm] mx-auto mt-4 mb-4 px-4 no-print flex flex-col sm:flex-row justify-between items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-print-border">
        <div class="flex items-center gap-3 w-full sm:w-auto">
            <i class="fa-solid fa-tv text-print-accent text-2xl"></i>
            <h1 class="text-xl font-bold text-gray-800">تقرير المباراة المتقدم</h1>
        </div>
        <div class="flex flex-wrap justify-center gap-2 w-full sm:w-auto">
            <button @click="installPWA()" id="installBtn" style="display:none;" class="px-4 py-2 rounded-lg bg-green-50 hover:bg-green-100 text-green-700 text-sm font-semibold flex items-center gap-2 border border-green-200">
                <i class="fa-solid fa-download"></i> تثبيت
            </button>
            <button @click="resetData()" class="px-4 py-2 rounded-lg bg-red-50 hover:bg-red-100 text-red-600 text-sm font-semibold flex items-center gap-2 border border-red-200">
                <i class="fa-solid fa-trash-can"></i> مسح
            </button>
            <button onclick="window.print()" class="px-6 py-2 rounded-lg bg-tv-dark hover:bg-gray-900 text-white shadow-md font-bold flex items-center gap-2">
                <i class="fa-solid fa-print"></i> طباعة
            </button>
        </div>
    </div>

    <div class="print-paper w-full max-w-[210mm] min-h-[297mm] mx-auto bg-white shadow-2xl md:rounded-lg overflow-hidden mb-12 p-4 md:p-[15mm] flex flex-col">
        
        <div class="print-header flex flex-col md:flex-row justify-between items-start border-b-2 border-gray-200 pb-4 mb-4 gap-4">
            <div class="flex flex-col gap-1 w-full md:flex-1">
                <input type="text" x-model="match.league" class="editable font-extrabold text-xl md:text-2xl text-print-text px-2 py-0.5 -ml-2" placeholder="اسم البطولة">
                <div class="flex flex-wrap md:flex-nowrap items-center gap-4 text-gray-600 text-xs md:text-sm">
                    <div class="flex items-center gap-1.5">
                        <i class="fa-regular fa-calendar-days text-tv-cyan"></i>
                        <input type="text" x-model="match.date" class="editable font-num px-1 py-0.5 w-24" placeholder="التاريخ">
                    </div>
                    <div class="flex items-center gap-1.5">
                        <i class="fa-solid fa-location-dot text-tv-red"></i>
                        <input type="text" x-model="match.stadium" class="editable px-1 py-0.5 min-w-[120px]" placeholder="الملعب">
                    </div>
                </div>
            </div>
            <div class="text-right md:text-left w-full md:w-auto flex flex-row md:flex-col justify-between items-center md:items-end">
                <div class="font-bold text-base md:text-lg text-print-text">تقرير البث</div>
                <div class="text-xs md:text-sm text-gray-500 font-num flex items-center gap-1">REF: #<input type="text" x-model="match.refId" class="editable w-12 text-left" placeholder="000"></div>
            </div>
        </div>

        <div class="w-full bg-[#111122] rounded-xl mb-6 relative overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.5)] border border-[#2a2a4a] text-white">
            
            <div class="absolute top-0 left-0 w-1/3 h-full bg-gradient-to-r from-tv-cyan/20 to-transparent blur-3xl pointer-events-none"></div>
            <div class="absolute top-0 right-0 w-1/3 h-full bg-gradient-to-l from-tv-red/20 to-transparent blur-3xl pointer-events-none"></div>
            
            <div class="h-10 bg-gradient-to-b from-white/10 to-transparent border-b border-white/10 flex justify-center items-center relative px-4">
                <div class="flex items-center gap-3">
                    <i class="fa-brands fa-premier-league text-white text-xl"></i>
                    <div class="h-5 w-px bg-white/20"></div>
                    <i class="fa-solid fa-futbol text-white text-lg"></i>
                </div>
                <input type="text" x-model="match.broadcastType" class="editable-dark text-[10px] md:text-xs font-bold tracking-widest text-gray-300 w-36 text-center absolute left-1/2 -translate-x-1/2" placeholder="HYBRID BROADCAST">
                
                <div class="absolute right-4 flex items-center gap-2 text-gray-400 text-xs">
                    <i class="fa-solid fa-chart-simple"></i>
                    <i class="fa-regular fa-clock"></i>
                </div>
            </div>

            <div class="flex items-stretch h-24 md:h-32 relative">
                
                <div class="flex-1 flex items-center justify-start pl-4 md:pl-10 relative border-b-4 border-tv-cyan bg-gradient-to-r from-transparent to-tv-cyan/10">
                    <div class="flex items-center gap-3 md:gap-6 z-10 w-full">
                        <label class="w-14 h-14 md:w-20 md:h-20 rounded-lg bg-black/50 border border-tv-cyan/50 hover:border-tv-cyan flex items-center justify-center cursor-pointer overflow-hidden relative group shadow-[0_0_15px_rgba(0,210,255,0.3)]">
                            <input type="file" accept="image/*" class="hidden no-print" @change="uploadLogo($event, 'A')">
                            <template x-if="match.logoA"><img :src="match.logoA" class="w-full h-full object-cover"></template>
                            <template x-if="!match.logoA"><span class="text-tv-cyan text-sm font-bold group-hover:text-white transition-colors">MS</span></template>
                        </label>
                        <div class="bg-black/60 border border-white/10 px-2 md:px-4 py-1 rounded">
                            <input type="text" x-model="match.teamA" class="editable-dark text-sm md:text-xl font-extrabold text-tv-cyan min-w-[100px] text-left" placeholder="محمد سلامة">
                        </div>
                    </div>
                </div>

                <div class="w-32 md:w-48 shrink-0 relative z-20 flex flex-col items-center justify-center -mx-4 md:-mx-8 rounded-xl bg-gradient-to-b from-[#1a1a3a] to-[#0a0a1a] border border-tv-magenta/40 shadow-[0_0_20px_rgba(184,0,255,0.3)]">
                    <div class="absolute top-0 w-full h-1 bg-gradient-to-r from-tv-cyan via-tv-magenta to-tv-red rounded-t-xl"></div>
                    <div class="flex items-center justify-center gap-2 md:gap-4 w-full">
                        <input type="text" x-model="match.scoreA" class="editable-dark text-4xl md:text-6xl font-num font-black text-white glow-white w-12 text-center p-0" placeholder="3">
                        <span class="text-2xl md:text-4xl font-black text-gray-500">-</span>
                        <input type="text" x-model="match.scoreB" class="editable-dark text-4xl md:text-6xl font-num font-black text-white glow-white w-12 text-center p-0" placeholder="2">
                    </div>
                    <div class="absolute -bottom-1 flex gap-1">
                        <div class="w-2 md:w-3 h-3 md:h-4 bg-yellow-400 rounded-sm shadow-md"></div>
                        <div class="w-2 md:w-3 h-3 md:h-4 bg-red-600 rounded-sm shadow-md"></div>
                    </div>
                </div>

                <div class="flex-1 flex items-center justify-between pr-4 md:pr-10 relative border-b-4 border-tv-red bg-gradient-to-l from-transparent to-tv-red/10">
                    
                    <div class="flex flex-col items-center ml-2 md:ml-8 z-10">
                        <div class="flex items-center gap-1 bg-red-600 px-2 py-0.5 rounded-full mb-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
                            <input type="text" x-model="match.liveText" class="editable-dark text-[8px] md:text-[10px] font-bold text-white w-8 text-center p-0" placeholder="LIVE">
                        </div>
                        <div class="flex items-baseline">
                            <input type="text" x-model="match.timeText" class="editable-dark text-2xl md:text-4xl font-num font-bold text-white w-10 md:w-14 text-center p-0" placeholder="67'">
                            <span class="text-tv-cyan text-sm md:text-xl -ml-1"></span>
                        </div>
                    </div>

                    <div class="flex items-center gap-3 md:gap-6 z-10">
                        <div class="bg-black/60 border border-white/10 px-2 md:px-4 py-1 rounded order-2 md:order-1">
                            <input type="text" x-model="match.teamB" class="editable-dark text-sm md:text-xl font-extrabold text-tv-red min-w-[100px] text-right md:text-left" placeholder="محمد عكاشة">
                        </div>
                        <label class="w-14 h-14 md:w-20 md:h-20 rounded-lg bg-black/50 border border-tv-red/50 hover:border-tv-red flex items-center justify-center cursor-pointer overflow-hidden relative group shadow-[0_0_15px_rgba(255,0,68,0.3)] order-1 md:order-2">
                            <input type="file" accept="image/*" class="hidden no-print" @change="uploadLogo($event, 'B')">
                            <template x-if="match.logoB"><img :src="match.logoB" class="w-full h-full object-cover"></template>
                            <template x-if="!match.logoB"><span class="text-tv-red text-sm font-bold group-hover:text-white transition-colors">MA</span></template>
                        </label>
                    </div>

                </div>
            </div>
            
            <div class="h-1 w-full flex">
                <div class="h-full bg-tv-cyan shadow-[0_0_10px_#00d2ff]" style="width: 50%;"></div>
                <div class="h-full bg-tv-red shadow-[0_0_10px_#ff0044]" style="width: 50%;"></div>
            </div>
        </div>

        <div class="mb-4 flex-1">
            <div class="flex justify-between items-center mb-3 pb-2 border-b border-gray-200">
                <h3 class="text-sm md:text-base font-bold flex items-center gap-2 text-print-text">
                    <i class="fa-solid fa-list-ol text-tv-magenta"></i> سجل الأحداث <span class="text-xs text-gray-400 font-num">(<span x-text="match.events.length"></span>/18)</span>
                </h3>
                <button @click="addEvent()" :disabled="match.events.length >= 18" class="no-print bg-gray-800 disabled:bg-gray-400 hover:bg-gray-700 text-white px-3 py-1.5 rounded-md text-xs font-semibold flex items-center gap-1.5 transition-colors">
                    <i class="fa-solid fa-plus"></i> إضافة حدث
                </button>
            </div>

            <div class="space-y-1.5 md:space-y-2">
                <template x-for="(event, index) in match.events" :key="index">
                    <div class="event-item flex flex-wrap md:grid md:grid-cols-[50px,30px,1fr,auto,auto] items-center gap-2 p-1.5 md:p-2 rounded-md bg-white border border-gray-200 hover:border-tv-cyan transition-all group">
                        
                        <div class="w-12 shrink-0 flex items-center justify-center gap-0.5 font-num font-bold text-sm text-gray-800 bg-gray-100 px-1 py-0.5 rounded border border-gray-200">
                            <input type="text" x-model="event.time" class="editable w-full text-center p-0 bg-transparent font-bold" placeholder="00">
                            <span class="text-[10px] text-gray-500">'</span>
                        </div>

                        <div class="w-6 shrink-0 flex justify-center event-icon text-sm">
                            <template x-if="event.type === 'goal'"><i class="fa-solid fa-futbol text-gray-800"></i></template>
                            <template x-if="event.type === 'yellow'"><i class="fa-solid fa-square text-yellow-400 border border-yellow-500 rounded-sm"></i></template>
                            <template x-if="event.type === 'red'"><i class="fa-solid fa-square text-red-600 border border-red-700 rounded-sm"></i></template>
                            <template x-if="event.type === 'sub'"><i class="fa-solid fa-right-left text-green-600"></i></template>
                        </div>

                        <div class="flex flex-col flex-1 min-w-[120px]">
                            <input type="text" x-model="event.player1" class="editable text-sm font-semibold text-print-text px-1 py-0" placeholder="اسم اللاعب...">
                            <template x-if="event.type === 'sub'">
                                <div class="flex items-center gap-1 text-[10px] text-gray-500">
                                    <i class="fa-solid fa-arrow-turn-down text-red-500 flip-x"></i>
                                    <input type="text" x-model="event.player2" class="editable flex-1 text-gray-500 px-1 py-0" placeholder="اللاعب الخارج...">
                                </div>
                            </template>
                        </div>

                        <div class="flex gap-1 no-print w-full md:w-auto mt-1 md:mt-0">
                            <select x-model="event.team" class="editable flex-1 bg-gray-50 border border-gray-300 rounded px-1 py-1 text-xs font-medium">
                                <option value="A">يسار (المضيف)</option>
                                <option value="B">يمين (الضيف)</option>
                            </select>
                            <select x-model="event.type" class="editable flex-1 bg-gray-50 border border-gray-300 rounded px-1 py-1 text-xs font-medium">
                                <option value="goal">هدف</option>
                                <option value="yellow">إنذار</option>
                                <option value="red">طرد</option>
                                <option value="sub">تبديل</option>
                            </select>
                        </div>

                        <div class="print-team-label text-xs font-bold text-gray-600 w-20 text-left">
                            <span x-text="event.team === 'A' ? match.teamA : match.teamB"></span>
                        </div>

                        <button @click="removeEvent(index)" class="no-print w-6 h-6 flex items-center justify-center rounded-full text-red-400 bg-red-50 hover:bg-red-100 md:opacity-0 group-hover:opacity-100 transition-all absolute left-2 md:relative md:left-0">
                            <i class="fa-solid fa-times text-xs"></i>
                        </button>
                    </div>
                </template>
                <template x-if="match.events.length === 0">
                    <div class="text-center py-6 text-gray-400 text-sm border border-dashed border-gray-300 rounded-md bg-gray-50">لا توجد أحداث</div>
                </template>
            </div>
        </div>

        <div class="mt-auto pt-6 border-t border-gray-200 w-full print:pt-4">
            <div class="grid grid-cols-2 gap-4 text-center text-xs text-gray-600">
                <div class="flex flex-col items-center gap-1">
                    <div class="w-full max-w-[120px] h-8 border-b border-gray-400 border-dashed"></div>
                    <div class="font-bold mt-1">توقيع حكم الساحة</div>
                </div>
                <div class="flex flex-col items-center gap-1">
                    <div class="w-full max-w-[120px] h-8 border-b border-gray-400 border-dashed"></div>
                    <div class="font-bold mt-1">توقيع مراقب المباراة</div>
                </div>
            </div>
            <div class="text-center text-[10px] text-gray-400 mt-4 font-num">تم إنشاء التقرير إلكترونياً • <span x-text="new Date().toLocaleDateString('ar-EG')"></span></div>
        </div>

    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            const defaultData = {
                league: 'دوري أبطال أوروبا', date: '15 مايو 2026', stadium: 'استاد الأبطال', refId: 'R-992',
                teamA: 'محمد سلامة', teamB: 'محمد عكاشة', logoA: null, logoB: null, scoreA: '3', scoreB: '2',
                broadcastType: 'HYBRID BROADCAST', liveText: 'LIVE', timeText: "67'",
                events: [
                    { time: '15', type: 'yellow', player1: 'أحمد سعيد', player2: '', team: 'A' },
                    { time: '30', type: 'goal', player1: 'محمد صلاح', player2: '', team: 'A' },
                    { time: '45', type: 'sub', player1: 'عمر كمال', player2: 'حسين الشحات', team: 'B' },
                    { time: '60', type: 'red', player1: 'محمود علاء', player2: '', team: 'B' }
                ]
            };

            Alpine.data('matchApp', () => ({
                match: defaultData,
                init() {
                    const saved = localStorage.getItem('matchReport_TV');
                    if (saved) { try { this.match = JSON.parse(saved); } catch (e) { this.match = defaultData; } }
                    this.$watch('match', (newValue) => { localStorage.setItem('matchReport_TV', JSON.stringify(newValue)); }, { deep: true });
                },
                uploadLogo(event, team) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        if (team === 'A') this.match.logoA = e.target.result;
                        if (team === 'B') this.match.logoB = e.target.result;
                    };
                    reader.readAsDataURL(file);
                },
                addEvent() {
                    if(this.match.events.length < 18) {
                        this.match.events.push({ time: '', type: 'goal', player1: '', player2: '', team: 'A' });
                    } else {
                        alert("الحد الأقصى هو ١٨ حدث لضمان ملاءمتها في ورقة واحدة.");
                    }
                },
                removeEvent(index) {
                    if(confirm('حذف الحدث؟')) this.match.events.splice(index, 1);
                },
                resetData() {
                    if(confirm('مسح كافة البيانات؟')) {
                        this.match = { ...defaultData, events: [], logoA: null, logoB: null }; 
                        localStorage.removeItem('matchReport_TV');
                    }
                }
            }))
        });

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'flex';
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                    document.getElementById('installBtn').style.display = 'none';
                });
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', (e) => self.skipWaiting());
                    self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                    self.addEventListener('fetch', (e) => { });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                
                navigator.serviceWorker.register(swUrl).catch(err => console.log(err));
            });
        }
    </script>
</body>
</html>
