<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4338CA">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>تقرير المباراة الرسمي</title>
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogItiq2YLYsdmK2LEg2KfZhNmF2KjYp9ix2KfYqSIsCiAgInNob3J0X25hbWUiOiAiTWF0Y2ggUmVwb3J0IiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAic3RhcnRfdXJsIjogIi4vIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZjFmNWY5IiwKICAidGhlbWVfY29sb3ciOiAiIzQzMzhDQSIsCiAgImljb25zIjogW3sic3JjIjogImh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzUzMjgvNTMyODA5OC5wbmciLCAic2l6ZXMiOiAiNTEyeDUxMiIsICJ0eXBlIjogImltYWdlL3BuZyJ9XQp9">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                        num: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        print: { text: '#111827', accent: '#4338CA', border: '#E5E7EB' },
                        tv: { main: '#0F172A', secondary: '#1E293B', accentA: '#3B82F6', accentB: '#EF4444' }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #F1F5F9; 
            font-family: 'Tajawal', sans-serif;
            color: #111827;
            -webkit-font-smoothing: antialiased;
        }
        
        /* التنسيقات العامة للحقول القابلة للتعديل */
        .editable {
            transition: all 0.2s ease;
            border: 1px solid transparent;
            border-radius: 0.375rem; 
            width: 100%;
            background: transparent;
        }
        .editable:hover { background-color: rgba(0,0,0,0.05); border-color: #CBD5E1; }
        .editable:focus {
            background-color: #FFFFFF;
            border-color: #4338CA;
            outline: none;
            color: #111827;
            box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.15);
        }

        /* حقول التعديل الداكنة المخصصة للوحة البث */
        .editable-dark {
            background: transparent;
            border: 1px dashed transparent;
            color: inherit;
            transition: all 0.2s ease;
            text-align: inherit;
            font-family: inherit;
            font-weight: inherit;
            font-size: inherit;
            padding: 0 4px;
            border-radius: 0.375rem;
            outline: none;
        }
        .editable-dark:hover { 
            border-color: rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.1); 
        }
        .editable-dark:focus {
            border-color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.5);
            border-style: solid;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .font-num { font-family: 'Inter', sans-serif; font-variant-numeric: tabular-nums; }
        
        /* إعدادات الطباعة الدقيقة */
        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            body { background-color: #FFFFFF !important; margin: 0 !important; padding: 0 !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .no-print { display: none !important; }
            .print-paper { width: 100% !important; max-width: 100% !important; margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; display: flex !important; flex-direction: column !important; min-height: 277mm !important; }
            .editable, .editable-dark { border: none !important; background-color: transparent !important; padding: 0 !important; appearance: none !important; }
            select.editable { display: none !important; }
            .print-team-label { display: block !important; white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important; }
            .event-item { display: grid !important; grid-template-columns: 45px 30px 1fr 100px !important; padding: 4px !important; margin-bottom: 2px !important; align-items: center !important; border-width: 1px !important; font-size: 0.75rem !important; gap: 4px !important; }
            .event-item input { font-size: 0.75rem !important; }
            .event-icon { font-size: 0.875rem !important; }
        }
        .print-team-label { display: none; }
    </style>
</head>
<body x-data="matchApp()">

    <div class="w-full max-w-[210mm] mx-auto mt-4 mb-4 px-4 no-print flex flex-col sm:flex-row justify-between items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-200">
        <div class="flex items-center gap-3 w-full sm:w-auto">
            <i class="fa-solid fa-tv text-print-accent text-2xl"></i>
            <h1 class="text-xl font-bold text-gray-800">تقرير المباراة المتقدم</h1>
        </div>
        <div class="flex flex-wrap justify-center gap-2 w-full sm:w-auto">
            <button @click="installPWA()" id="installBtn" style="display:none;" class="px-4 py-2 rounded-lg bg-green-50 hover:bg-green-100 text-green-700 text-sm font-semibold flex items-center gap-2 border border-green-200">
                <i class="fa-solid fa-download"></i> تثبيت
            </button>
            <button @click="resetData()" class="px-4 py-2 rounded-lg bg-red-50 hover:bg-red-100 text-red-600 text-sm font-semibold flex items-center gap-2 border border-red-200">
                <i class="fa-solid fa-trash-can"></i> مسح
            </button>
            <button onclick="window.print()" class="px-6 py-2 rounded-lg bg-gray-900 hover:bg-black text-white shadow-md font-bold flex items-center gap-2">
                <i class="fa-solid fa-print"></i> طباعة
            </button>
        </div>
    </div>

    <div class="print-paper w-full max-w-[210mm] min-h-[297mm] mx-auto bg-white shadow-2xl md:rounded-lg overflow-hidden mb-12 p-4 md:p-[15mm] flex flex-col">
        
        <div class="flex flex-col md:flex-row justify-between items-start border-b-2 border-gray-200 pb-4 mb-6 gap-4">
            <div class="flex flex-col gap-1 w-full md:flex-1">
                <input type="text" x-model="match.league" class="editable font-extrabold text-2xl text-print-text px-2 py-0.5 -ml-2" placeholder="اسم البطولة">
                <div class="flex flex-wrap md:flex-nowrap items-center gap-4 text-gray-600 text-sm">
                    <div class="flex items-center gap-1.5">
                        <i class="fa-regular fa-calendar-days text-blue-600"></i>
                        <input type="text" x-model="match.date" class="editable font-num px-1 py-0.5 w-28" placeholder="التاريخ">
                    </div>
                    <div class="flex items-center gap-1.5">
                        <i class="fa-solid fa-location-dot text-red-500"></i>
                        <input type="text" x-model="match.stadium" class="editable px-1 py-0.5 min-w-[150px]" placeholder="الملعب">
                    </div>
                </div>
            </div>
            <div class="text-right md:text-left w-full md:w-auto flex flex-row md:flex-col justify-between items-center md:items-end">
                <div class="font-bold text-lg text-gray-800">تقرير المباراة الرسمي</div>
                <div class="text-sm text-gray-500 font-num flex items-center gap-1">Match ID: #<input type="text" x-model="match.refId" class="editable w-14 text-left" placeholder="000"></div>
            </div>
        </div>

        <div class="w-full flex justify-center py-6 mb-6 rounded-2xl print:py-2 print:mb-4 select-none" style="background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);">
            
            <div class="relative w-full max-w-[850px] md:h-[220px] bg-black/40 backdrop-blur-md rounded-2xl border border-white/20 shadow-[0_0_50px_rgba(0,0,0,0.5)] overflow-hidden flex flex-col p-4 print:shadow-none print:border-gray-800 mx-4">
                
                <div class="absolute -left-20 top-1/2 -translate-y-1/2 w-64 h-64 bg-blue-600/30 blur-[80px] pointer-events-none"></div>
                <div class="absolute -right-20 top-1/2 -translate-y-1/2 w-64 h-64 bg-red-600/30 blur-[80px] pointer-events-none"></div>

                <div class="flex justify-center items-center gap-6 mb-2 opacity-80 relative z-10">
                    <img src="https://upload.wikimedia.org/wikipedia/en/f/f2/Premier_League_Logo.svg" class="h-8 filter brightness-200">
                    <div class="h-6 w-[1px] bg-white/20"></div>
                    <img src="https://upload.wikimedia.org/wikipedia/en/b/bf/UEFA_Champions_League_logo_2.svg" class="h-8 filter brightness-200">
                </div>

                <div class="flex items-center justify-between flex-1 relative z-10 px-2 md:px-4">
                    
                    <div class="flex flex-col items-center gap-2 w-[30%]">
                        <div class="relative group">
                            <label class="block w-16 h-16 md:w-24 md:h-24 rounded-2xl bg-gradient-to-b from-blue-400 to-blue-600 p-0.5 shadow-[0_0_20px_rgba(59,130,246,0.5)] cursor-pointer overflow-hidden border border-white/30">
                                <input type="file" accept="image/*" class="hidden no-print" @change="uploadLogo($event, 'A')">
                                <div class="w-full h-full bg-[#0a101d] rounded-[14px] flex items-center justify-center overflow-hidden">
                                    <template x-if="match.logoA">
                                        <img :src="match.logoA" class="w-full h-full object-contain p-1">
                                    </template>
                                    <template x-if="!match.logoA">
                                        <div class="text-white font-black text-xl md:text-3xl">MS</div>
                                    </template>
                                </div>
                            </label>
                            <div class="absolute -inset-1 bg-blue-400 blur opacity-20 group-hover:opacity-40 transition"></div>
                        </div>
                        <input type="text" x-model="match.teamA" class="editable-dark w-full text-center text-sm md:text-2xl font-black text-white drop-shadow-md" placeholder="محمد سلامة">
                        <div class="w-full max-w-[120px] h-1 bg-blue-500 shadow-[0_0_10px_#3b82f6]"></div>
                    </div>

                    <div class="flex flex-col items-center justify-center w-[35%] relative">
                        <div class="bg-gradient-to-b from-white/10 to-transparent border border-white/20 rounded-2xl px-4 md:px-6 py-1 md:py-2 flex items-center justify-center gap-2 md:gap-4 shadow-2xl backdrop-blur-xl">
                            <input type="text" x-model="match.scoreA" class="editable-dark w-10 md:w-16 text-center text-4xl md:text-7xl font-black text-white font-num" placeholder="3">
                            <span class="text-3xl md:text-6xl font-black text-white/30 self-center">-</span>
                            <input type="text" x-model="match.scoreB" class="editable-dark w-10 md:w-16 text-center text-4xl md:text-7xl font-black text-white font-num" placeholder="2">
                        </div>
                        
                        <div class="flex items-center gap-2 md:gap-4 mt-3">
                            <div class="flex items-center gap-1 bg-red-600 px-2 py-0.5 rounded-full shadow-[0_0_10px_#ef4444]">
                                <div class="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></div>
                                <input type="text" x-model="match.liveText" class="editable-dark text-[8px] md:text-[10px] font-black text-white tracking-tighter w-8 text-center p-0" placeholder="LIVE">
                            </div>
                            <div class="flex items-center font-num">
                                <input type="text" x-model="match.timeText" class="editable-dark text-2xl md:text-4xl font-black text-white drop-shadow-lg w-12 md:w-16 text-center p-0" placeholder="67'">
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col items-center gap-2 w-[30%]">
                        <div class="relative group">
                            <label class="block w-16 h-16 md:w-24 md:h-24 rounded-2xl bg-gradient-to-b from-red-500 to-red-700 p-0.5 shadow-[0_0_20px_rgba(239,68,68,0.5)] cursor-pointer overflow-hidden border border-white/30">
                                <input type="file" accept="image/*" class="hidden no-print" @change="uploadLogo($event, 'B')">
                                <div class="w-full h-full bg-[#120505] rounded-[14px] flex items-center justify-center overflow-hidden">
                                    <template x-if="match.logoB">
                                        <img :src="match.logoB" class="w-full h-full object-contain p-1">
                                    </template>
                                    <template x-if="!match.logoB">
                                        <div class="text-white font-black text-xl md:text-3xl">MA</div>
                                    </template>
                                </div>
                            </label>
                            <div class="absolute -inset-1 bg-red-500 blur opacity-20 group-hover:opacity-40 transition"></div>
                        </div>
                        <input type="text" x-model="match.teamB" class="editable-dark w-full text-center text-sm md:text-2xl font-black text-white drop-shadow-md" placeholder="محمد عكاشة">
                        <div class="w-full max-w-[120px] h-1 bg-red-600 shadow-[0_0_10px_#ef4444]"></div>
                    </div>

                </div>

                <div class="flex justify-center gap-4 mt-2 opacity-60 pb-2 relative z-10">
                    <div class="flex gap-1">
                        <div class="w-3 h-4 bg-yellow-400 rounded-sm shadow-sm"></div>
                        <div class="w-3 h-4 bg-red-600 rounded-sm shadow-sm"></div>
                    </div>
                    <i class="fa-solid fa-chart-simple text-white text-xs self-center"></i>
                    <i class="fa-regular fa-clock text-white text-xs self-center"></i>
                </div>
            </div>
        </div>
        <div class="mb-4 flex-1">
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-200">
                <h3 class="text-base font-bold flex items-center gap-2 text-print-text">
                    <i class="fa-solid fa-list-ul text-blue-600"></i> سجل أحداث المباراة <span class="text-xs text-gray-500 font-num bg-gray-100 px-2 py-0.5 rounded-full"><span x-text="match.events.length"></span>/18</span>
                </h3>
                <button @click="addEvent()" :disabled="match.events.length >= 18" class="no-print bg-gray-800 disabled:bg-gray-400 hover:bg-gray-700 text-white px-3 py-1.5 rounded-md text-sm font-semibold flex items-center gap-1.5 transition-colors shadow-sm">
                    <i class="fa-solid fa-plus"></i> إضافة حدث
                </button>
            </div>

            <div class="space-y-2">
                <template x-for="(event, index) in match.events" :key="index">
                    <div class="event-item flex flex-wrap md:grid md:grid-cols-[50px,30px,1fr,auto,auto] items-center gap-3 p-2 rounded-lg bg-white border border-gray-200 hover:border-blue-400 hover:shadow-sm transition-all group">
                        
                        <div class="w-12 shrink-0 flex items-center justify-center gap-0.5 font-num font-bold text-sm text-gray-800 bg-slate-100 px-1 py-1 rounded border border-slate-200">
                            <input type="text" x-model="event.time" class="editable w-full text-center p-0 bg-transparent font-bold" placeholder="00">
                            <span class="text-[10px] text-gray-500">'</span>
                        </div>

                        <div class="w-6 shrink-0 flex justify-center event-icon text-sm">
                            <template x-if="event.type === 'goal'"><i class="fa-solid fa-futbol text-gray-800"></i></template>
                            <template x-if="event.type === 'yellow'"><i class="fa-solid fa-square text-yellow-400 border border-yellow-500 rounded-sm"></i></template>
                            <template x-if="event.type === 'red'"><i class="fa-solid fa-square text-red-600 border border-red-700 rounded-sm"></i></template>
                            <template x-if="event.type === 'sub'"><i class="fa-solid fa-right-left text-green-600"></i></template>
                        </div>

                        <div class="flex flex-col flex-1 min-w-[140px]">
                            <input type="text" x-model="event.player1" class="editable text-sm font-bold text-gray-800 px-1 py-0.5" placeholder="اسم اللاعب (الأساسي)...">
                            <template x-if="event.type === 'sub'">
                                <div class="flex items-center gap-1 text-[11px] text-gray-500 mt-0.5">
                                    <i class="fa-solid fa-arrow-turn-down text-red-500 flip-x"></i>
                                    <input type="text" x-model="event.player2" class="editable flex-1 text-gray-500 px-1 py-0" placeholder="اللاعب المستبدل (الخارج)...">
                                </div>
                            </template>
                        </div>

                        <div class="flex gap-2 no-print w-full md:w-auto mt-2 md:mt-0">
                            <select x-model="event.team" class="editable flex-1 bg-slate-50 border border-slate-200 rounded px-2 py-1.5 text-xs font-semibold text-gray-700 focus:bg-white">
                                <option value="A">الفريق الأيسر (A)</option>
                                <option value="B">الفريق الأيمن (B)</option>
                            </select>
                            <select x-model="event.type" class="editable flex-1 bg-slate-50 border border-slate-200 rounded px-2 py-1.5 text-xs font-semibold text-gray-700 focus:bg-white">
                                <option value="goal">هدف</option>
                                <option value="yellow">إنذار</option>
                                <option value="red">طرد</option>
                                <option value="sub">تبديل</option>
                            </select>
                        </div>

                        <div class="print-team-label text-xs font-bold text-gray-600 w-24 text-left">
                            <span x-text="event.team === 'A' ? match.teamA : match.teamB"></span>
                        </div>

                        <button @click="removeEvent(index)" class="no-print w-7 h-7 flex items-center justify-center rounded-md text-red-500 bg-red-50 hover:bg-red-500 hover:text-white transition-all absolute left-2 md:relative md:left-0 opacity-100 md:opacity-0 group-hover:opacity-100">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                    </div>
                </template>
                <template x-if="match.events.length === 0">
                    <div class="text-center py-8 text-gray-400 text-sm border-2 border-dashed border-gray-200 rounded-lg bg-gray-50">لم يتم تسجيل أي أحداث حتى الآن</div>
                </template>
            </div>
        </div>

        <div class="mt-auto pt-6 border-t-2 border-gray-100 w-full print:pt-4">
            <div class="grid grid-cols-2 gap-4 text-center text-sm text-gray-700">
                <div class="flex flex-col items-center gap-2">
                    <div class="w-full max-w-[150px] h-10 border-b border-gray-400 border-dashed"></div>
                    <div class="font-bold">توقيع حكم الساحة</div>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-full max-w-[150px] h-10 border-b border-gray-400 border-dashed"></div>
                    <div class="font-bold">توقيع مراقب المباراة</div>
                </div>
            </div>
            <div class="text-center text-[11px] text-gray-400 mt-6 font-num tracking-wide">
                تم إنشاء التقرير إلكترونياً بواسطة نظام الإدارة • <span x-text="new Date().toLocaleDateString('ar-EG')"></span>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            const defaultData = {
                league: 'دوري أبطال أوروبا', date: '15 مايو 2026', stadium: 'استاد الأبطال', refId: 'R-992',
                teamA: 'محمد سلامة', teamB: 'محمد عكاشة', logoA: null, logoB: null, scoreA: '3', scoreB: '2',
                liveText: 'LIVE', timeText: "67'",
                events: [
                    { time: '15', type: 'yellow', player1: 'أحمد سعيد', player2: '', team: 'A' },
                    { time: '30', type: 'goal', player1: 'محمد صلاح', player2: '', team: 'A' },
                    { time: '45', type: 'sub', player1: 'عمر كمال', player2: 'حسين الشحات', team: 'B' },
                    { time: '60', type: 'red', player1: 'محمود علاء', player2: '', team: 'B' }
                ]
            };

            Alpine.data('matchApp', () => ({
                match: defaultData,
                init() {
                    const saved = localStorage.getItem('matchReport_Final');
                    if (saved) { try { this.match = JSON.parse(saved); } catch (e) { this.match = defaultData; } }
                    this.$watch('match', (newValue) => { localStorage.setItem('matchReport_Final', JSON.stringify(newValue)); }, { deep: true });
                },
                uploadLogo(event, team) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        if (team === 'A') this.match.logoA = e.target.result;
                        if (team === 'B') this.match.logoB = e.target.result;
                    };
                    reader.readAsDataURL(file);
                },
                addEvent() {
                    if(this.match.events.length < 18) {
                        this.match.events.push({ time: '', type: 'goal', player1: '', player2: '', team: 'A' });
                    } else {
                        alert("عفواً، الحد الأقصى هو ١٨ حدث لضمان طباعة التقرير في ورقة واحدة بشكل سليم.");
                    }
                },
                removeEvent(index) {
                    if(confirm('هل أنت متأكد من حذف هذا الحدث؟')) this.match.events.splice(index, 1);
                },
                resetData() {
                    if(confirm('هل أنت متأكد من مسح كافة بيانات التقرير؟')) {
                        this.match = { ...defaultData, events: [], logoA: null, logoB: null, scoreA: '0', scoreB: '0', teamA: '', teamB: '' }; 
                        localStorage.removeItem('matchReport_Final');
                    }
                }
            }))
        });

        // PWA Setup
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'flex';
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                    document.getElementById('installBtn').style.display = 'none';
                });
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', (e) => self.skipWaiting());
                    self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                    self.addEventListener('fetch', (e) => { });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log(err));
            });
        }
    </script>
</body>
</html>
