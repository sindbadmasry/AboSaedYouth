<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Sports Tournament Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Inter:wght@600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'], num: ['Inter', 'sans-serif'] },
                    colors: {
                        navy: '#0B1D3A',       // Primary
                        neon: '#00FF9C',       // Secondary
                        electric: '#1DA1F2',   // Accent
                        dark: '#050b14'
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050b14; color: #ffffff; background-image: radial-gradient(circle at top right, rgba(29, 161, 242, 0.15), transparent 40%), radial-gradient(circle at bottom left, rgba(0, 255, 156, 0.1), transparent 40%); background-attachment: fixed; }
        
        /* Glassmorphism Classes */
        .glass-card {
            background: rgba(11, 29, 58, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        .glass-header {
            background: rgba(5, 11, 20, 0.8);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1DA1F2; border-radius: 10px; }
    </style>
</head>
<body x-data="appData()" x-init="initApp()" class="antialiased overflow-hidden flex h-screen text-gray-200">

    <aside class="w-64 glass-card m-4 hidden md:flex flex-col relative z-20 overflow-hidden shrink-0">
        <div class="p-6 border-b border-white/10 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-neon to-electric flex items-center justify-center shadow-lg shadow-neon/20">
                <i class="fa-solid fa-trophy text-navy text-xl"></i>
            </div>
            <h1 class="font-black text-xl tracking-wide bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">برو ليج</h1>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <template x-for="item in menu" :key="item.id">
                <button @click="currentPage = item.id" 
                        :class="{'bg-electric/20 text-electric border-r-4 border-neon shadow-[inset_0_0_20px_rgba(29,161,242,0.1)]': currentPage === item.id, 'text-gray-400 hover:bg-white/5 hover:text-white border-r-4 border-transparent': currentPage !== item.id}"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-300 font-semibold text-right">
                    <i :class="item.icon" class="w-5 text-center"></i>
                    <span x-text="item.name"></span>
                </button>
            </template>
        </nav>

        <div class="p-4 border-t border-white/10">
            <div class="flex items-center gap-3 p-2 rounded-lg bg-white/5">
                <div class="w-10 h-10 rounded-full bg-navy border border-electric/30 flex items-center justify-center text-electric">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <div>
                    <div class="text-sm font-bold text-white">إدارة النظام</div>
                    <div class="text-xs text-neon" x-show="isAdmin">صلاحيات كاملة</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative z-10">
        
        <header class="glass-header h-20 px-8 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-gray-400 hover:text-white"><i class="fa-solid fa-bars text-xl"></i></button>
                <h2 class="text-2xl font-bold text-white tracking-wide" x-text="getPageTitle()"></h2>
            </div>
            <div class="flex items-center gap-4">
                <button class="w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center text-gray-300 relative transition-colors">
                    <i class="fa-regular fa-bell"></i>
                    <span class="absolute top-2 right-2 w-2 h-2 bg-neon rounded-full shadow-[0_0_8px_#00FF9C]"></span>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            
            <div x-show="isLoading" class="flex flex-col items-center justify-center h-64 gap-4">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-neon"></i>
                <p class="text-gray-400 font-medium animate-pulse">جاري تحميل البيانات...</p>
            </div>

            <div x-show="currentPage === 'dashboard' && !isLoading" x-transition.opacity class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="glass-card p-6 relative overflow-hidden group">
                        <div class="absolute -right-6 -top-6 w-24 h-24 bg-neon/10 rounded-full blur-2xl group-hover:bg-neon/20 transition-all"></div>
                        <div class="flex justify-between items-start relative z-10">
                            <div>
                                <p class="text-gray-400 text-sm font-semibold mb-1">إجمالي البطولات</p>
                                <h3 class="text-4xl font-black font-num text-white" x-text="stats.tournamentsCount">0</h3>
                            </div>
                            <div class="w-12 h-12 rounded-xl bg-neon/10 text-neon flex items-center justify-center text-xl shadow-[0_0_15px_rgba(0,255,156,0.15)]">
                                <i class="fa-solid fa-trophy"></i>
                            </div>
                        </div>
                    </div>

                    <div class="glass-card p-6 relative overflow-hidden group">
                        <div class="absolute -right-6 -top-6 w-24 h-24 bg-electric/10 rounded-full blur-2xl group-hover:bg-electric/20 transition-all"></div>
                        <div class="flex justify-between items-start relative z-10">
                            <div>
                                <p class="text-gray-400 text-sm font-semibold mb-1">الفرق المسجلة</p>
                                <h3 class="text-4xl font-black font-num text-white" x-text="stats.teamsCount">0</h3>
                            </div>
                            <div class="w-12 h-12 rounded-xl bg-electric/10 text-electric flex items-center justify-center text-xl shadow-[0_0_15px_rgba(29,161,242,0.15)]">
                                <i class="fa-solid fa-shield-halved"></i>
                            </div>
                        </div>
                    </div>

                    <div class="glass-card p-6 relative overflow-hidden group">
                        <div class="absolute -right-6 -top-6 w-24 h-24 bg-purple-500/10 rounded-full blur-2xl group-hover:bg-purple-500/20 transition-all"></div>
                        <div class="flex justify-between items-start relative z-10">
                            <div>
                                <p class="text-gray-400 text-sm font-semibold mb-1">عدد اللاعبين</p>
                                <h3 class="text-4xl font-black font-num text-white" x-text="stats.playersCount">0</h3>
                            </div>
                            <div class="w-12 h-12 rounded-xl bg-purple-500/10 text-purple-400 flex items-center justify-center text-xl shadow-[0_0_15px_rgba(168,85,247,0.15)]">
                                <i class="fa-solid fa-users"></i>
                            </div>
                        </div>
                    </div>

                    <div class="glass-card p-6 relative overflow-hidden group">
                        <div class="absolute -right-6 -top-6 w-24 h-24 bg-red-500/10 rounded-full blur-2xl group-hover:bg-red-500/20 transition-all"></div>
                        <div class="flex justify-between items-start relative z-10">
                            <div>
                                <p class="text-gray-400 text-sm font-semibold mb-1">مباريات قادمة</p>
                                <h3 class="text-4xl font-black font-num text-white" x-text="stats.upcomingMatches">0</h3>
                            </div>
                            <div class="w-12 h-12 rounded-xl bg-red-500/10 text-red-400 flex items-center justify-center text-xl shadow-[0_0_15px_rgba(239,68,68,0.15)]">
                                <i class="fa-solid fa-stopwatch"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass-card overflow-hidden">
                    <div class="p-6 border-b border-white/5 flex justify-between items-center">
                        <h3 class="text-lg font-bold text-white flex items-center gap-2">
                            <i class="fa-solid fa-futbol text-electric"></i> أحدث المباريات
                        </h3>
                        <button class="text-sm text-electric hover:text-neon transition-colors">عرض الكل</button>
                    </div>
                    <div class="p-0">
                        <template x-if="latestMatches.length === 0">
                            <div class="p-8 text-center text-gray-500 text-sm">لا توجد مباريات مسجلة حالياً</div>
                        </template>
                        <div class="divide-y divide-white/5">
                            <template x-for="match in latestMatches" :key="match.ID">
                                <div class="p-4 hover:bg-white/5 transition-colors flex items-center justify-between">
                                    <div class="flex items-center gap-4 w-1/3 justify-end">
                                        <span class="font-bold text-white" x-text="match.TeamA"></span>
                                        <div class="w-8 h-8 bg-navy border border-white/10 rounded-full flex items-center justify-center"><i class="fa-solid fa-shield text-xs text-gray-500"></i></div>
                                    </div>
                                    <div class="px-6 flex flex-col items-center justify-center">
                                        <div class="bg-navy/80 border border-electric/30 px-4 py-1 rounded-lg font-num font-black text-xl tracking-widest text-white shadow-[0_0_10px_rgba(29,161,242,0.2)]">
                                            <span x-text="match.ScoreA"></span> - <span x-text="match.ScoreB"></span>
                                        </div>
                                        <span class="text-[10px] text-neon mt-1" x-show="match.Status === 'Live'">LIVE</span>
                                        <span class="text-[10px] text-gray-500 mt-1 font-num" x-show="match.Status !== 'Live'" x-text="match.Date"></span>
                                    </div>
                                    <div class="flex items-center gap-4 w-1/3 justify-start">
                                        <div class="w-8 h-8 bg-navy border border-white/10 rounded-full flex items-center justify-center"><i class="fa-solid fa-shield text-xs text-gray-500"></i></div>
                                        <span class="font-bold text-white" x-text="match.TeamB"></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

            </div>

            <div x-show="currentPage !== 'dashboard' && !isLoading" x-transition.opacity>
                <div class="glass-card p-12 text-center">
                    <div class="w-20 h-20 mx-auto bg-electric/10 text-electric rounded-full flex items-center justify-center text-3xl mb-4">
                        <i class="fa-solid fa-hammer"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-white mb-2">قيد التطوير</h2>
                    <p class="text-gray-400">هذه الوحدة (<span x-text="getPageTitle()" class="text-neon"></span>) سيتم بناؤها في المرحلة القادمة.</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appData', () => ({
                isLoading: true,
                isAdmin: false,
                currentPage: 'dashboard',
                menu: [
                    { id: 'dashboard', name: 'الرئيسية', icon: 'fa-solid fa-chart-pie' },
                    { id: 'tournaments', name: 'إدارة البطولات', icon: 'fa-solid fa-trophy' },
                    { id: 'teams', name: 'الفرق', icon: 'fa-solid fa-shield-halved' },
                    { id: 'players', name: 'اللاعبين', icon: 'fa-solid fa-users' },
                    { id: 'matches', name: 'المباريات', icon: 'fa-solid fa-futbol' },
                    { id: 'standings', name: 'جدول الترتيب', icon: 'fa-solid fa-list-ol' },
                    { id: 'stats', name: 'الإحصائيات', icon: 'fa-solid fa-chart-column' },
                    { id: 'payments', name: 'الاشتراكات والأقساط', icon: 'fa-solid fa-wallet' },
                    { id: 'settings', name: 'الإعدادات', icon: 'fa-solid fa-gear' }
                ],
                stats: { tournamentsCount: 0, teamsCount: 0, playersCount: 0, upcomingMatches: 0 },
                latestMatches: [],

                initApp() {
                    // استدعاء البيانات من Google Apps Script
                    google.script.run
                        .withSuccessHandler((response) => {
                            if(response.success) {
                                this.stats = response.stats;
                                this.latestMatches = response.latestMatches;
                                this.isAdmin = response.isAdmin;
                            }
                            this.isLoading = false;
                        })
                        .withFailureHandler((error) => {
                            console.error("Error fetching data:", error);
                            this.isLoading = false;
                        })
                        .getDashboardStats();
                },

                getPageTitle() {
                    const page = this.menu.find(p => p.id === this.currentPage);
                    return page ? page.name : '';
                }
            }));
        });
    </script>
</body>
</html>
